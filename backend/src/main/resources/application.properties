# ==============================
# Database Settings
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_banking
spring.datasource.username=postgres
spring.datasource.password=bankingTest
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate & JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Save dates in UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==============================
# Server / API Context
# ==============================
server.servlet.context-path=/api/v1
server.port=8092

# ==============================
# JWT & Security
# ==============================
jwt.security.password_pepper=${PASSWORD_PEPPER}       # Env variable?dan gelecek
jwt.security.secret_key_accessToken=${JWT_SECRET_KEY} # Env variable?dan gelecek
access_token_expiration=6000                          # Token expiration in seconds

# ==============================
# Frontend / Mode
# ==============================
frontend.url=http://localhost:5173
mode=dev
